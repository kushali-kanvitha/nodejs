<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="autosuggest.css">
    <title>AutoSuggest</title>
</head>
<body>
    <div class="card-1">
        <div>
        <span class="left-bar">&#9881;</span>  
        <span class="right-bar">&#8226; online | &#128336; - ms</span>
        </div>
    <div class="search-section">
        <h1><span class="logo-first">Being</span> <span class="logo-last">Infinity</span></h1>
        <p class="tag-line">One million phrases. Four algorithms. Prefix Based Auto Suggest.</p>
        <br>
        <span><span class="lens">&#128269</span> 
        <input class="search-box" id="search-box" placeholder="Start typing to search phrases">
        </span>
        <div id="suggestion-box">
            <!-- Suggestion box -->
        </div>
    </div>
    </div>

    <script>
        var searchBox=document.getElementById("search-box");
        var suggestionBox=document.getElementById("suggestion-box");
        searchBox.addEventListener("input",function()
        {
            var userInput=searchBox.value;
            //get user typed text
            if(userInput.trim()==="")
           {
               suggestionBox.innerHTML="";
               return;
           }
           else{
            var url1="https://autosuggest-backend.onrender.com/api/autosuggest?q=";
            var url3="&algorithm=brute&limit=10&weighted=false";
            var url=url1+encodeURIComponent(userInput)+url3;
            //make api call to suggestion
            fetch(url)
               .then(function(response){
                return response.json();
               })
               .then(function(data){
                console.log(data);
                var resultsArray=data.results;
                var htmlResults="";
                for(var i=0;i<resultsArray.length;i++)
               {
                htmlResults+="<div id='suggestion-item'>"+resultsArray[i].text+"</div>";
               }
               suggestionBox.innerHTML=htmlResults;

               })
               .catch(function(error){
                console.log(error);
               })
           }
            //display data in html

        })
    </script>
</body>
</html>
